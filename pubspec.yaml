name: roadguard
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any
  shared_preferences: ^2.5.3
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  dotted_border: ^3.1.0
  google_places_flutter: ^2.1.1
  provider: ^6.1.5+1
  http: ^1.6.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  image_picker: ^1.2.1
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^16.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  



  assets:
    - assets/images/
    - assets/fonts/
    - assets/svg/

  fonts:
    - family: EnglishFont
      fonts:
        - asset: assets/fonts/InstrumentSans-Italic-VariableFont_wdth,wght.ttf
        - asset: assets/fonts/InstrumentSans-VariableFont_wdth,wght.ttf

    - family: ArabicFont
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
    - family: PlateFont
      fonts:
        - asset: assets/fonts/Mandatory.otf
    - family: DINarabic
      fonts:
        - asset: assets/fonts/DINNextLTArabic-Regular-3.ttf